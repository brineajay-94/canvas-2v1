<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Users - Canvas +2 College of Science, Law and Management</title>
  <link rel="icon" href="../assets/images/logo.png" type="image/png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
  <script>if ((localStorage.getItem('adminTheme') || 'light') === 'dark') document.documentElement.classList.add('dark');</script>
  <script src="https://www.gstatic.com/firebasejs/7.24.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/7.24.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/7.24.0/firebase-firestore.js"></script>
</head>
<body class="admin-body">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon"><img src="../assets/images/logo.png" alt="Canvas+2"></div>
      <div class="sidebar-logo-text">
        <span>Canvas +2 College of Science, Law and Management</span>
        <small>Admin Panel</small>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a href="index.html" class="sidebar-link">
        <i class="fas fa-tachometer-alt"></i> Dashboard
      </a>
      <a href="users.html" class="sidebar-link active">
        <i class="fas fa-users"></i> Users
      </a>
      <a href="team.html" class="sidebar-link">
        <i class="fas fa-user-friends"></i> Team
      </a>
      <a href="slider.html" class="sidebar-link">
        <i class="fas fa-images"></i> Slider
      </a>
      <a href="notices.html" class="sidebar-link">
        <i class="fas fa-bullhorn"></i> Notices
      </a>

      <a href="contacts.html" class="sidebar-link"><i class="fas fa-envelope"></i> Contacts</a>
      <a href="admissions.html" class="sidebar-link"><i class="fas fa-user-graduate"></i> Admissions</a>
      <span class="sidebar-nav-label">Results</span>
      <a href="view-result.html" class="sidebar-link">
        <i class="fas fa-file-invoice"></i> View Result
      </a>
      <a href="results.html" class="sidebar-link">
        <i class="fas fa-cog"></i> Manage Sheets
      </a>
      <a href="templates.html" class="sidebar-link">
        <i class="fas fa-file-excel"></i> Templates
      </a>
    </nav>
          <a href="../index.html" class="sidebar-link" target="_blank">
        <i class="fas fa-external-link-alt"></i> Visit Website
      </a>
    <div class="sidebar-footer">
      <button class="sidebar-link" onclick="handleLogout()">
        <i class="fas fa-sign-out-alt"></i> Sign out
      </button>
    </div>
  </aside>

  <div class="main-content">
    <header class="admin-header">
      <div class="header-left">
        <button class="header-btn mobile-toggle" onclick="toggleSidebar()">
          <i class="fas fa-bars"></i>
        </button>
        <h1>Users</h1>
      </div>
      <div class="header-right">
        <button class="header-btn" onclick="toggleAdminTheme()" title="Toggle theme">
          <i class="fas fa-moon"></i>
        </button>
        <div class="admin-avatar" id="adminAvatar">A</div>
      </div>
    </header>

    <div class="page-content">
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">All Users</span>
          <div class="panel-actions" style="display:flex;gap:8px;flex-wrap:wrap;">
            <select id="roleFilter" class="form-control" style="width:auto;min-width:120px;padding:6px 10px;font-size:0.85rem;" onchange="loadUsers()">
              <option value="all">All Roles</option>
              <option value="admin">Admin</option>
              <option value="teacher">Teacher</option>
            </select>
            <button class="btn btn-primary" onclick="openAddUserModal()">
              <i class="fas fa-plus"></i> Add User
            </button>
          </div>
        </div>
        <div class="panel-body">
          <div class="table-container">
            <table>
              <thead>
                <tr>
                  <th>Full Name</th>
                  <th>Email</th>
                  <th>Role</th>
                  <th>Assigned Subjects</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="usersTableBody">
                <tr><td colspan="5"><div class="empty-state"><h3>Loading users...</h3></div></td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="userModal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="userModalTitle">Add User</span>
        <button class="modal-close" onclick="closeWithConfirm('userModal')"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body">
        <form id="userForm">
          <div class="form-group">
            <label for="userName">Full Name</label>
            <input type="text" id="userName" class="form-control" required>
          </div>
          <div class="form-group">
            <label for="userEmail">Email</label>
            <input type="email" id="userEmail" class="form-control" required>
          </div>
          <div class="form-group" id="passwordGroup">
            <label for="userPassword">Password</label>
            <input type="password" id="userPassword" class="form-control" minlength="6">
          </div>
          <div class="form-group">
            <label for="userRole">Role</label>
            <select id="userRole" class="form-control" onchange="toggleSubjectAssignment()">
              <option value="teacher">Teacher</option>
              <option value="admin">Admin</option>
            </select>
          </div>
          <div class="form-group" id="subjectAssignment">
            <label>Assigned Subjects</label>
            <div id="subjectAddControls"></div>
            <div id="subjectCheckboxes"></div>
            <div id="autoAssignInfo"></div>
          </div>
          <div class="form-actions">
            <button type="button" class="btn btn-secondary" onclick="closeWithConfirm('userModal')">Cancel</button>
            <button type="submit" class="btn btn-primary">Save User</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="../assets/js/firebase-config.js"></script>
  <script src="../assets/js/main.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/subject-utils.js"></script>
  <script src="../assets/js/admin/admin.js"></script>
  <script src="../assets/js/admin/users.js"></script>
</body>
</html>
