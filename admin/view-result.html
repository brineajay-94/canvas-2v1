  <style>
    .watermark-logo {
      position:absolute; top:50%; left:50%;
      transform:translate(-50%,-50%) rotate(-20deg);
      width:220px; height:220px;
      opacity:0.04; pointer-events:none; z-index:9;
      object-fit:contain;
    }
    .gs { font-family:'Segoe UI',Helvetica,Arial,sans-serif; }
    .gs table { width:100%; border-collapse:collapse; }
    .gs table th { background:#f4f6f8; color:#1f2328; padding:10px 16px; font-size:14px; font-weight:700; text-transform:uppercase; letter-spacing:0.8px; text-align:center; border-bottom:2px solid #1a3c6d; }
    .gs table th:first-child { text-align:left; }
    .gs table td { padding:10px 16px; border-bottom:1px solid #d8dee4; text-align:center; font-size:14px; }
    .gs table td:first-child { text-align:left; font-weight:500; color:#1f2328; }
    .gs table tbody tr:last-child td { border-bottom:1px solid #bac0c8; }
    .sig-line { width:160px; border-top:2px solid #1a3c6d; margin:0 auto 8px; }
    .no-print { display:flex; justify-content:center; gap:10px; flex-wrap:wrap; margin-top:16px; }

    .edit-toolbar { display:flex; align-items:center; gap:4px; padding:6px 12px; background:#fff; border:1px solid #d0d7de; border-radius:8px; box-shadow:0 4px 16px rgba(0,0,0,0.12); flex-wrap:wrap; }
    .edit-tb-group { display:flex; gap:2px; }
    .edit-tb-btn { width:32px; height:32px; display:flex; align-items:center; justify-content:center; border:1px solid transparent; border-radius:6px; background:transparent; cursor:pointer; font-size:14px; color:#1f2328; }
    .edit-tb-btn:hover { background:#f3f4f6; border-color:#d0d7de; }
    .edit-tb-btn:active { background:#e8eaed; }
    .edit-tb-divider { width:1px; height:24px; background:#d0d7de; margin:0 4px; }
    .edit-tb-done { background:#1a3c6d !important; color:#fff !important; padding:0 14px !important; width:auto !important; border-radius:6px !important; font-size:13px !important; font-weight:600; }
    .edit-tb-done:hover { background:#1e4a8a !important; }

    .editable-shape { position:absolute; cursor:move; z-index:10; }
    .editable-shape.shape-selected { outline:2px solid #2563eb; outline-offset:1px; }
    .shape-handle { position:absolute; width:10px; height:10px; background:#fff; border:2px solid #2563eb; border-radius:2px; z-index:11; }
    .shape-handle.nw { top:-6px; left:-6px; cursor:nw-resize; }
    .shape-handle.n { top:-6px; left:50%; margin-left:-5px; cursor:n-resize; }
    .shape-handle.ne { top:-6px; right:-6px; cursor:ne-resize; }
    .shape-handle.e { top:50%; right:-6px; margin-top:-5px; cursor:e-resize; }
    .shape-handle.se { bottom:-6px; right:-6px; cursor:se-resize; }
    .shape-handle.s { bottom:-6px; left:50%; margin-left:-5px; cursor:s-resize; }
    .shape-handle.sw { bottom:-6px; left:-6px; cursor:sw-resize; }
    .shape-handle.w { top:50%; left:-6px; margin-top:-5px; cursor:w-resize; }

    .edit-mode .gs * { cursor:text; }

    @media screen {
      #resultDisplay .gs { max-width:100% !important; border:none !important; border-radius:0 !important; padding:4px 8px !important; }
      #resultDisplay .gs, #resultDisplay .gs * { font-size:9px !important; }
      #resultDisplay .gs [style*="font-weight:800"], #resultDisplay .gs [style*="font-weight:700"] { font-size:12px !important; }
      #resultDisplay .gs img { width:22px !important; height:22px !important; padding:0 !important; }
      #resultDisplay .gs th, #resultDisplay .gs td { padding:2px 6px !important; }
      #resultDisplay .gs .sig-line { width:60px !important; margin-bottom:3px !important; }
    }
    .edit-mode .gs table td, .edit-mode .gs table th { cursor:text; }
    .edit-mode .editable-shape { cursor:move !important; }
    .edit-mode .editable-shape * { cursor:move !important; }
    .edit-mode .editable-shape .shape-handle { cursor:inherit !important; }

    @media print {
      body { background:#fff !important; margin:0 !important; padding:0 !important; }
      body.admin-body { display:block !important; }
      .sidebar, .admin-header, #searchView, .toast-container,
      .sidebar-overlay, #toastContainer, .mobile-toggle, .modal-overlay, .no-print { display:none !important; }
      .main-content {
        margin:0 !important; padding:0 !important;
        height:100% !important; display:flex !important; flex-direction:column !important;
        box-sizing:border-box !important;
        -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important;
      }
      .page-content { flex:1 !important; display:flex !important; flex-direction:column !important; padding:0 !important; max-width:100% !important; }
      #resultDisplay { flex:1 !important; display:flex !important; flex-direction:column !important; margin:0 !important; padding:0 !important; }
      #resultDisplay .gs { flex:1 !important; display:flex !important; flex-direction:column !important; padding:12px !important; max-width:none !important; margin:0 !important; border:4px solid #1a3c6d !important; outline:1px solid #1a3c6d !important; outline-offset:-8px !important; border-radius:0 !important; }
      .watermark-logo { display:block !important; }
      @page { size:A4; margin:8mm; }
    }
  </style>

  <script>
    var _sheetsTabMap = {};
    var _pendingAction = null;
    var _resultData = null;
    var _sheetName = '';

    async function loadPublishedSheets() {
      var select = document.getElementById('resultSheet');
      try {
        var snap = await db.collection('resultSheets').where('published', '==', true).get();
        if (snap.empty) { select.innerHTML = '<option value="">-- No published sheets --</option>'; return; }
        var opts = '<option value="">-- Select Result Sheet --</option>';
        snap.forEach(function (doc) {
          var d = doc.data();
          _sheetsTabMap[doc.id] = d.tabName || d.name;
          opts += '<option value="' + doc.id + '">' + d.name + '</option>';
        });
        select.innerHTML = opts;
      } catch (e) { select.innerHTML = '<option value="">-- Error loading sheets --</option>'; }
    }

    var _subjectNames = {
      'English': { full: 'Compulsory English', short: 'ENG' },
      'Nepali': { full: 'Compulsory Nepali', short: 'NEP' },
      'Social': { full: 'Social Studies', short: 'SOC' },
      'BasicMath': { full: 'Basic Mathematics', short: 'B.MATH' },
      'Economics': { full: 'Economics', short: 'ECO' },
      'Account': { full: 'Accountancy', short: 'ACC' },
      'BusinessStudies': { full: 'Business Studies', short: 'BS' },
      'ComputerScience': { full: 'Computer Science', short: 'CS' },
      'HotelManagement': { full: 'Hotel Management', short: 'HM' },
      'BusinessMath': { full: 'Business Mathematics', short: 'BM' }
    };

    function getSubjectLabel(raw) {
      var canon = typeof SubjectUtils !== 'undefined' && SubjectUtils.match ? SubjectUtils.match(raw) : null;
      if (!canon) return raw;
      var info = _subjectNames[canon];
      return info ? info.full : canon;
    }

    function toggleClassCustom() {
      document.getElementById('classCustomGroup').style.display = document.getElementById('classSelect').value === '__custom__' ? '' : 'none';
    }

    function closeClassModal() {
      document.getElementById('classModal').classList.remove('open');
      _pendingAction = null;
    }

    function showClassModal(action) {
      _pendingAction = action;
      document.getElementById('classModal').classList.add('open');
    }

    function getSelectedClass() {
      var sel = document.getElementById('classSelect').value;
      if (sel === '__custom__') return document.getElementById('classCustom').value.trim() || '12';
      return sel;
    }

    function proceedWithClass() {
      var cls = getSelectedClass();
      var action = _pendingAction;
      closeClassModal();
      if (action === 'print') doPrint(cls);
      else if (action === 'png') doDownload('png', cls);
      else if (action === 'pdf') doDownload('pdf', cls);
    }

    function printGradesheet() {
      if (!document.querySelector('#resultDisplay .gs')) return;
      doPrint();
    }

    function downloadResult(format) {
      if (!document.querySelector('#resultDisplay .gs')) return;
      doDownload(format);
    }

    function gradeColor(g) {
      if (g === 'NG') return '#cf222e';
      return '#1a3c6d';
    }

    function buildGradesheet(symbol, studentName, subjectRows, gpa, grade, sheetName, cls) {
      var isNg = grade === 'NG';
      var h = [];
      h.push('<div class="gs" style="max-width:780px;margin:0 auto;background:#fff;border:1px solid #d0d7de;border-radius:8px;position:relative;padding:16px 20px;">');

      h.push('<div style="display:flex;align-items:center;gap:18px;padding:22px 32px 12px;border-bottom:1px solid #d0d7de;">');
      h.push('<img src="../assets/images/logo.png" alt="" style="width:50px;height:50px;object-fit:contain;padding:3px;">');
      h.push('<div><div style="font-size:20px;font-weight:800;color:#1a3c6d;">Canvas +2 College of Science, Law and Management</div><div style="font-size:14px;color:#656d76;">Triyuga-11, Gaighat, Udayapur, Nepal</div></div>');
      h.push('</div>');

      h.push('<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 32px;background:#f8fafc;border-bottom:1px solid #d0d7de;">');
      h.push('<div style="font-size:15px;font-weight:700;color:#1a3c6d;letter-spacing:1px;text-transform:uppercase;">Statement of Grades</div>');
      h.push('<div style="display:flex;gap:12px;font-size:14px;color:#1f2328;">');
      if (cls) h.push('<span><span style="font-weight:600;">Class:</span> ' + cls + '</span>');
      else h.push('<span><span style="font-weight:600;">Class:</span> ---</span>');
      h.push('</div></div>');

      h.push('<div style="display:flex;justify-content:space-between;padding:10px 32px;border-bottom:1px solid #d0d7de;font-size:14px;">');
      h.push('<div><span style="font-weight:600;color:#1a3c6d;">Symbol No:</span> ' + symbol + '</div>');
      h.push('<div><span style="font-weight:600;color:#1a3c6d;">Student Name:</span> ' + (studentName||'â€”') + '</div>');
      h.push('</div>');

      if (subjectRows.length) {
        h.push('<table><thead><tr><th style="font-size:14px;">Subject</th><th style="width:80px;font-size:14px;">Grade</th><th style="width:100px;font-size:14px;">Grade Point</th></tr></thead><tbody>');
        subjectRows.forEach(function(row){
          var gp = row.grade === 'A+' ? 4.0 : row.grade === 'A' ? 3.6 : row.grade === 'B+' ? 3.2 : row.grade === 'C+' ? 2.8 : row.grade === 'C' ? 2.4 : row.grade === 'D+' ? 2.0 : row.grade === 'D' ? 1.6 : 0.0;
          h.push('<tr><td style="font-size:14px;padding:8px 16px;">' + row.label + '</td><td style="font-weight:700;color:' + gradeColor(row.grade) + ';font-size:14px;padding:8px;">' + row.grade + '</td><td style="font-weight:600;font-size:14px;padding:8px;">' + (row.grade === 'NG' ? '0.0' : gp.toFixed(1)) + '</td></tr>');
        });
        h.push('</tbody></table>');
      }

      h.push('<div style="display:flex;justify-content:space-between;align-items:center;padding:12px 32px;border-top:2px solid #1a3c6d;border-bottom:1px solid #d0d7de;">');
      h.push('<div><div style="font-size:13px;text-transform:uppercase;color:#656d76;letter-spacing:1px;">GPA</div><div style="font-size:22px;font-weight:800;color:' + (isNg ? '#cf222e' : '#1a3c6d') + ';line-height:1.2;">' + (gpa || 'â€”') + '</div></div>');
      h.push('<div style="text-align:right;"><div style="font-size:13px;text-transform:uppercase;color:#656d76;letter-spacing:1px;">Overall Grade</div><div style="font-size:22px;font-weight:800;color:' + (isNg ? '#cf222e' : '#1a3c6d') + ';">' + (grade || 'â€”') + '</div></div>');
      h.push('</div>');

      h.push('<div style="flex:1;"></div>');

      h.push('<div style="display:flex;justify-content:space-around;padding:16px 40px 8mm;">');
      h.push('<div style="text-align:center;"><div class="sig-line"></div><div style="font-size:14px;color:#656d76;">Exam Controller</div></div>');
      h.push('<div style="text-align:center;"><div class="sig-line"></div><div style="font-size:14px;color:#656d76;">Principal</div></div>');
      h.push('</div>');

      h.push('</div>');

      h.push('<div class="no-print">');
      h.push('<button class="btn btn-secondary btn-sm" onclick="toggleEditMode()"><i class="fas fa-edit"></i> Edit</button>');
      h.push('<button class="btn btn-secondary btn-sm" onclick="downloadResult(\'png\')"><i class="fas fa-image"></i> PNG</button>');
      h.push('<button class="btn btn-secondary btn-sm" onclick="downloadResult(\'pdf\')"><i class="fas fa-file-pdf"></i> PDF</button>');
      h.push('<button class="btn btn-primary btn-sm" onclick="printGradesheet()"><i class="fas fa-print"></i> Print</button>');
      h.push('</div>');
      h.push('<div id="editToolbar" class="no-print" style="display:none;justify-content:center;margin-top:8px;">');
      h.push('<div class="edit-toolbar">');
      h.push('<div class="edit-tb-group"><button class="edit-tb-btn" onclick="execCmd(\'bold\')" title="Bold"><b>B</b></button><button class="edit-tb-btn" onclick="execCmd(\'italic\')" title="Italic"><i>I</i></button><button class="edit-tb-btn" onclick="execCmd(\'underline\')" title="Underline"><u>U</u></button></div>');
      h.push('<div class="edit-tb-divider"></div>');
      h.push('<div class="edit-tb-group"><button class="edit-tb-btn" onclick="addShape(\'rect\')" title="Rectangle">â–¬</button><button class="edit-tb-btn" onclick="addShape(\'circle\')" title="Circle">â—</button><button class="edit-tb-btn" onclick="addShape(\'line\')" title="Line">â•±</button><button class="edit-tb-btn" onclick="addShape(\'text\')" title="Text Box">T</button></div>');
      h.push('<div class="edit-tb-divider"></div>');
      h.push('<div class="edit-tb-group"><button class="edit-tb-btn" onclick="deleteShape()" title="Delete" style="color:#cf222e;">âœ•</button></div>');
      h.push('<div class="edit-tb-divider"></div>');
      h.push('<div class="edit-tb-group"><button class="edit-tb-btn edit-tb-done" onclick="toggleEditMode()">Done</button></div>');
      h.push('</div></div>');

      return h.join('');
    }

    async function searchResult() {
      var sheetId = document.getElementById('resultSheet').value;
      var symbol = document.getElementById('symbolNumber').value.trim();
      var display = document.getElementById('resultDisplay');
      var status = document.getElementById('searchStatus');

      if (!sheetId) { status.innerHTML = '<span style="color:var(--color-danger-fg);"><i class="fas fa-exclamation-circle"></i> Select a result sheet.</span>'; return; }
      if (!symbol) { status.innerHTML = '<span style="color:var(--color-danger-fg);"><i class="fas fa-exclamation-circle"></i> Enter a symbol number.</span>'; return; }

      status.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Searching...';
      display.innerHTML = '';

      try {
        var doc = await db.collection('resultSheets').doc(sheetId).get();
        if (!doc.exists) { status.innerHTML = '<span style="color:var(--color-danger-fg);"><i class="fas fa-exclamation-circle"></i> Sheet not found.</span>'; return; }
        var sheet = doc.data();
        var webUrl = sheet.webUrl;
        if (!webUrl) { status.innerHTML = '<span style="color:var(--color-fg-muted);"><i class="fas fa-info-circle"></i> No web URL configured.</span>'; return; }
        sheetsService.setWebAppUrl(webUrl);
        var tabName = sheet.tabName || sheet.name;
        var result = await sheetsService.fetchResult(tabName, symbol, sheet.googleSheetId);
        status.innerHTML = '<span style="color:var(--color-success-emphasis);"><i class="fas fa-check-circle"></i> Result found!</span>';

        _sheetName = sheet.name;
        _resultData = { result: result, symbol: symbol };

        var nameKey = Object.keys(result).find(function(k){return /name|student/i.test(k)&&!/TH|PR/i.test(k);})||'';
        var studentName = result[nameKey]||'';

        var subjectRows = [];
        var skipKeys = Object.keys(result).filter(function(k){return /symbol|name|total|percentage|gpa|grade|result|sn|s\.n|^$/i.test(k);});
        var detected = {};
        Object.keys(result).forEach(function(k){
          var t=String(k).trim();
          if(/ TH$/i.test(t)){var s=t.replace(/ TH$/i,'').trim();if(!detected[s])detected[s]={};detected[s].thKey=k;}
          if(/ PR$/i.test(t)){var s=t.replace(/ PR$/i,'').trim();if(!detected[s])detected[s]={};detected[s].prKey=k;}
        });
        var hasThPr = Object.keys(detected).some(function(s){return detected[s].thKey||detected[s].prKey;});
        if(!hasThPr){Object.keys(result).forEach(function(k){if(skipKeys.indexOf(k)>=0)return;if(!detected[k])detected[k]={totalKey:k};});}

        Object.keys(detected).forEach(function(subj){
          var thVal,prVal,subjTotal,isCombined=false;
          if(detected[subj].totalKey){
            isCombined=true;
            var v=result[detected[subj].totalKey];
            subjTotal=(v!==undefined&&v!==null&&v!=='')?Number(v):''; thVal=''; prVal='';
          } else {
            var th=detected[subj].thKey?result[detected[subj].thKey]:undefined;
            var pr=detected[subj].prKey?result[detected[subj].prKey]:undefined;
            thVal=(th!==undefined&&th!==null&&th!=='')?th:'';
            prVal=(pr!==undefined&&pr!==null&&pr!=='')?pr:'';
            if(thVal===''&&prVal==='')return;
            subjTotal=(thVal!==''&&prVal!=='')?Number(thVal)+Number(prVal):(thVal!==''?Number(thVal):'');
          }
          if(isCombined&&subjTotal==='')return;
          var gr='';
          if(subjTotal!==''&&!isNaN(subjTotal)){
            var t=Number(subjTotal);
            gr=t>=90?'A+':t>=80?'A':t>=70?'B+':t>=60?'C+':t>=50?'C':t>=40?'D+':t>=35?'D':'NG';
            if(!isCombined&&(Number(thVal)<27||(prVal!==''&&Number(prVal)<10)||t<35))gr='NG';
            if(isCombined&&t<35)gr='NG';
          }
          subjectRows.push({label:getSubjectLabel(subj),grade:gr||'NG'});
        });

        var gpa=result['GPA']||result['Gpa']||'';
        var grade=result['GRADE']||result['Grade']||result['Result']||'';

        _resultData.studentName = studentName;
        _resultData.subjectRows = subjectRows;
        _resultData.gpa = gpa;
        _resultData.grade = grade;

        display.innerHTML = buildGradesheet(symbol, studentName, subjectRows, gpa, grade, sheet.name, '');
      } catch (e) {
        status.innerHTML = '<span style="color:var(--color-danger-fg);"><i class="fas fa-exclamation-circle"></i> ' + (e.message || 'Result not found.') + '</span>';
        display.innerHTML = '';
      }
    }

    function addWatermark(card) {
      if (card.querySelector('.watermark-logo')) return;
      var wm = document.createElement('img');
      wm.className = 'watermark-logo';
      wm.src = '../assets/images/logo.png';
      wm.alt = '';
      card.style.position = 'relative';
      card.insertBefore(wm, card.firstChild);
    }

    function removeWatermark(card) {
      var wm = card.querySelector('.watermark-logo');
      if (wm) wm.remove();
    }

    function doPrint() {
      var card = document.querySelector('#resultDisplay .gs');
      if (!card) return;
      addWatermark(card);
      setTimeout(function(){ window.print(); setTimeout(function(){ removeWatermark(card); }, 300); }, 100);
    }

    async function doDownload(format) {
      var card = document.querySelector('#resultDisplay .gs');
      if (!card) return;
      addWatermark(card);
      try {
        var canvas = await html2canvas(card, { scale: 3, backgroundColor: '#ffffff', allowTaint: false, useCORS: true, logging: false });
        if (format === 'png') {
          var link = document.createElement('a'); link.download = 'gradesheet.png'; link.href = canvas.toDataURL('image/png'); link.click();
        } else {
          var imgData = canvas.toDataURL('image/png');
          var pdf = new window.jspdf.jsPDF({ orientation: 'p', unit: 'mm', format: 'a4' });
          var pw = pdf.internal.pageSize.getWidth();
          var ph = (canvas.height * pw) / canvas.width;
          if (ph > 297) ph = 297;
          pdf.addImage(imgData, 'PNG', 0, 0, pw, Math.min(ph, 297));
          pdf.save('gradesheet.pdf');
        }
      } catch (e) { showToast('Download failed: ' + e.message, 'error'); }
      removeWatermark(card);
    }

    /* â”€â”€ Editor System â”€â”€ */
    var _editMode = false, _selectedShape = null, _dragData = null;

    function toggleEditMode() {
      _editMode = !_editMode;
      var gs = document.querySelector('#resultDisplay .gs');
      var tb = document.getElementById('editToolbar');
      if (!gs) return;
      if (_editMode) {
        gs.contentEditable = 'true';
        tb.style.display = 'flex';
        document.getElementById('resultDisplay').classList.add('edit-mode');
        makeShapesInteractive();
      } else {
        gs.contentEditable = 'false';
        tb.style.display = 'none';
        document.getElementById('resultDisplay').classList.remove('edit-mode');
        deselectShape();
        _dragData = null;
        document.removeEventListener('mousemove', onDragMove);
        document.removeEventListener('mouseup', onDragEnd);
      }
    }

    function execCmd(cmd) {
      document.execCommand(cmd, false, null);
      var gs = document.querySelector('#resultDisplay .gs');
      if (gs) gs.focus();
    }

    function selectShape(el) {
      deselectShape();
      _selectedShape = el;
      if (el) el.classList.add('shape-selected');
    }

    function deselectShape() {
      if (_selectedShape) { _selectedShape.classList.remove('shape-selected'); _selectedShape = null; }
    }

    function addShape(type) {
      var gs = document.querySelector('#resultDisplay .gs');
      if (!gs) return;
      var el = document.createElement('div');
      el.className = 'editable-shape';
      el.style.cssText = 'position:absolute;z-index:10;';
      var w = 100, h = 60, st = '';

      if (type === 'rect') {
        st = 'border:2px solid #1a3c6d;background:rgba(26,60,109,0.08);border-radius:2px;width:'+w+'px;height:'+h+'px;top:120px;left:60px;';
      } else if (type === 'circle') {
        st = 'border:2px solid #1a3c6d;background:rgba(26,60,109,0.08);width:80px;height:80px;border-radius:50%;top:120px;left:60px;';
      } else if (type === 'line') {
        st = 'border-top:2px solid #1a3c6d;width:140px;height:0;top:140px;left:60px;';
      } else if (type === 'text') {
        st = 'min-width:80px;min-height:28px;top:120px;left:60px;font-size:14px;color:#1f2328;padding:4px;background:transparent;';
        el.contentEditable = 'true';
        el.textContent = 'Text';
      }
      el.style.cssText += st;

      ['nw','n','ne','e','se','s','sw','w'].forEach(function(d) {
        var h = document.createElement('div');
        h.className = 'shape-handle ' + d;
        el.appendChild(h);
      });

      el.addEventListener('mousedown', function(e) {
        if (e.target.classList.contains('shape-handle')) return;
        e.preventDefault();
        selectShape(el);
        startDrag(el, e);
      });

      el.querySelectorAll('.shape-handle').forEach(function(h) {
        var dir = Array.from(h.classList).filter(function(c){ return /^[nsew]+$/.test(c); })[0];
        if (!dir) return;
        h.addEventListener('mousedown', function(e) {
          e.stopPropagation(); e.preventDefault();
          selectShape(el);
          startResize(el, dir, e);
        });
      });

      gs.appendChild(el);
      selectShape(el);
    }

    function deleteShape() {
      if (!_selectedShape) { showToast('Select a shape first.', 'info'); return; }
      _selectedShape.parentNode.removeChild(_selectedShape);
      _selectedShape = null;
    }

    function startDrag(el, e) {
      _dragData = { el: el, type: 'move', sx: e.clientX, sy: e.clientY, l: px(el.style.left), t: px(el.style.top) };
      document.addEventListener('mousemove', onDragMove);
      document.addEventListener('mouseup', onDragEnd);
    }

    function onDragMove(e) {
      if (!_dragData) return;
      var d = _dragData, dx = e.clientX - d.sx, dy = e.clientY - d.sy;
      if (d.type === 'move') {
        d.el.style.left = (d.l + dx) + 'px';
        d.el.style.top = (d.t + dy) + 'px';
      } else if (d.type === 'resize') {
        if (d.dir.indexOf('e') >= 0) d.el.style.width = Math.max(20, d.w + dx) + 'px';
        if (d.dir.indexOf('w') >= 0) { d.el.style.width = Math.max(20, d.w - dx) + 'px'; d.el.style.left = (d.l + dx) + 'px'; }
        if (d.dir.indexOf('s') >= 0) d.el.style.height = Math.max(20, d.h + dy) + 'px';
        if (d.dir.indexOf('n') >= 0) { d.el.style.height = Math.max(20, d.h - dy) + 'px'; d.el.style.top = (d.t + dy) + 'px'; }
        if (d.dir === 'line') d.el.style.width = Math.max(20, d.w + dx) + 'px';
      }
    }

    function onDragEnd() {
      if (_dragData && _dragData.type === 'resize' && _dragData.el) {
        _dragData.el.style.cursor = '';
        _dragData.el.querySelectorAll('.shape-handle').forEach(function(h){ h.style.display=''; });
      }
      _dragData = null;
      document.removeEventListener('mousemove', onDragMove);
      document.removeEventListener('mouseup', onDragEnd);
    }

    function px(v) { return parseInt(v) || 0; }

    function makeShapesInteractive() {
      document.querySelectorAll('.editable-shape').forEach(function(el) {
        el.querySelectorAll('.shape-handle').forEach(function(h) {
          var dir = Array.from(h.classList).filter(function(c){ return /^[nsew]+$/.test(c); })[0];
          if (!dir) return;
          h.addEventListener('mousedown', function(e) {
            e.stopPropagation();
            e.preventDefault();
            selectShape(el);
            startResize(el, dir, e);
          });
        });
      });
    }

    function startResize(el, dir, e) {
      var r = el.getBoundingClientRect();
      var p = el.parentNode.getBoundingClientRect();
      var l = el.offsetLeft, t2 = el.offsetTop;
      var w = el.offsetWidth, h2 = el.offsetHeight;

      el.style.cursor = dir + '-resize';
      el.querySelectorAll('.shape-handle').forEach(function(h){ h.style.display='none'; });

      _dragData = {
        el: el, type: 'resize', dir: dir,
        sx: e.clientX, sy: e.clientY,
        l: l, t: t2, w: w, h: h2,
        rb: l + w, bb: t2 + h2
      };
      document.addEventListener('mousemove', onDragMove);
      document.addEventListener('mouseup', onDragEnd);
    }

    function onKeydown(e) {
      if (!_editMode) return;
      if (e.key === 'Delete' || e.key === 'Backspace') {
        var sel = document.activeElement;
        if (sel && sel.classList && sel.classList.contains('editable-shape')) {
          e.preventDefault();
          deleteShape();
          return;
        }
        if (_selectedShape && !sel.closest) {
          e.preventDefault();
          deleteShape();
        }
      }
    }

    document.addEventListener('DOMContentLoaded', function () { loadPublishedSheets(); });
    document.addEventListener('keydown', onKeydown);
  </script>
