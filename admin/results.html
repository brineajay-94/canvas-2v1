<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Sheets - Canvas+2 College of Management</title>
  <link rel="icon" href="../assets/images/logo.png" type="image/png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
  <script>if ((localStorage.getItem('adminTheme') || 'light') === 'dark') document.documentElement.classList.add('dark');</script>
  <script src="https://www.gstatic.com/firebasejs/7.24.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/7.24.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/7.24.0/firebase-firestore.js"></script>
  <style>
    .badge-active { background:#dafbe1; color:#116329; }
    .badge-inactive { background:#f6f8fa; color:#656d76; }
    .badge-published { background:#ddf4ff; color:#0969da; }
    .badge-unpublished { background:#f6f8fa; color:#656d76; }
    .dark .badge-active { background:#1a3d2b; color:#7ee787; }
    .dark .badge-inactive { background:#21262d; color:#8b949e; }
    .dark .badge-published { background:#0c2d4a; color:#58a6ff; }
    .dark .badge-unpublished { background:#21262d; color:#8b949e; }
  </style>
</head>
<body class="admin-body">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon"><img src="../assets/images/logo.png" alt="Canvas+2"></div>
      <div class="sidebar-logo-text">
        <span>Canvas+2 College of Management</span>
        <small>Admin Panel</small>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a href="index.html" class="sidebar-link"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
      <a href="users.html" class="sidebar-link"><i class="fas fa-users"></i> Users</a>
      <a href="team.html" class="sidebar-link"><i class="fas fa-user-friends"></i> Team</a>
      <a href="slider.html" class="sidebar-link"><i class="fas fa-images"></i> Slider</a>
      <a href="notices.html" class="sidebar-link"><i class="fas fa-bullhorn"></i> Notices</a>

      <a href="contacts.html" class="sidebar-link"><i class="fas fa-envelope"></i> Contacts</a>
      <a href="admissions.html" class="sidebar-link"><i class="fas fa-user-graduate"></i> Admissions</a>
      <span class="sidebar-nav-label">Results</span>
      <a href="view-result.html" class="sidebar-link"><i class="fas fa-file-invoice"></i> View Result</a>
      <a href="results.html" class="sidebar-link active"><i class="fas fa-cog"></i> Manage Sheets</a>
    </nav>
    <a href="../index.html" class="sidebar-link" target="_blank"><i class="fas fa-external-link-alt"></i> Visit Website</a>
    <div class="sidebar-footer">
      <button class="sidebar-link" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i> Sign out</button>
    </div>
  </aside>

  <div class="main-content">
    <header class="admin-header">
      <div class="header-left">
        <button class="header-btn mobile-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
        <h1>Manage Sheets</h1>
      </div>
      <div class="header-right">
        <button class="header-btn" onclick="toggleAdminTheme()" title="Toggle theme"><i class="fas fa-moon"></i></button>
        <div class="admin-avatar" id="adminAvatar">A</div>
      </div>
    </header>

    <div class="page-content">
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title"><i class="fas fa-file-alt"></i> All Result Sheets</span>
          <div class="panel-actions">
            <button class="btn btn-primary" onclick="openAddSheetModal()"><i class="fas fa-plus"></i> Add Sheet</button>
          </div>
        </div>
        <div class="panel-body">
          <div class="table-container">
            <table>
              <thead>
                <tr>
                  <th>Sheet Name</th>
                  <th>Class</th>
                  <th>Google Sheet ID</th>
                  <th>Status</th>
                  <th>Published</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="sheetsTableBody">
                <tr><td colspan="6" style="text-align:center;">Loading sheets...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="sheetModal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="sheetModalTitle">Add Result Sheet</span>
        <button class="modal-close" onclick="closeWithConfirm('sheetModal')"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body">
        <form id="sheetForm">
          <div class="form-group">
            <label for="sheetName">Sheet Name</label>
            <input type="text" id="sheetName" class="form-control" required placeholder="e.g. Grade 12 Science">
          </div>
          <div class="form-group">
            <label for="sheetClassLevel">Class Level</label>
            <select id="sheetClassLevel" class="form-control" required>
              <option value="">-- Select Class --</option>
              <option value="11">Class 11</option>
              <option value="12">Class 12</option>
            </select>
          </div>
          <div class="form-group">
            <label for="sheetGoogleId">Google Sheet ID <small style="font-weight:400;color:var(--color-fg-muted);">(optional)</small></label>
            <input type="text" id="sheetGoogleId" class="form-control" placeholder="e.g. 1BXiM...">
          </div>
          <div class="form-actions">
            <button type="button" class="btn btn-secondary" onclick="closeWithConfirm('sheetModal')">Cancel</button>
            <button type="submit" class="btn btn-primary">Save Sheet</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="../assets/js/firebase-config.js"></script>
  <script src="../assets/js/main.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/admin/admin.js"></script>
  <script src="../assets/js/admin/results.js"></script>
</body>
</html>
